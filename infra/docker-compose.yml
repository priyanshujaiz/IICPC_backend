services:
  # ── Application Services ───────────────────────────────────────────────────

  gateway:
    build:
      context: ..                                  # monorepo root
      dockerfile: packages/gateway/Dockerfile
    container_name: iicpc-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env                                    # JWT_SECRET, ADMIN_* from root .env
    environment:
      PORT: "3000"
      TIMESCALE_URL: postgres://postgres:postgres@timescale:5432/iicpc
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: submissions
      SANDBOX_URL: http://sandbox:3001
      KAFKA_BROKERS: redpanda:9092
      FRONTEND_URL: "http://localhost:3000"
    depends_on:
      redis:
        condition: service_healthy
      timescale:
        condition: service_healthy
      minio:
        condition: service_healthy
      sandbox:
        condition: service_started
    networks:
      - iicpc-network

  sandbox:
    build:
      context: ..                                  # monorepo root
      dockerfile: packages/sandbox/Dockerfile
    container_name: iicpc-sandbox
    restart: unless-stopped
    ports:
      - "3001:3001"                                # exposed for direct curl during dev
    env_file:
      - ../.env                                    # picks up any overrides
    environment:
      SANDBOX_PORT: "3001"
      KAFKA_BROKERS: redpanda:9092                 # internal Redpanda broker
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MAX_RUNTIME_MS: "600000"                     # 10 min auto-stop per submission
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Dockerode needs Docker daemon access
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - iicpc-network   # talks to redis, minio, redpanda, gateway
      - sandbox-net     # talks to submission containers by internal IP

  
  bot-fleet:
      build:
        context: ..
        dockerfile: packages/bot-fleet/Dockerfile
      container_name: iicpc-bot-fleet
      restart: unless-stopped
      env_file:
        - ../.env
      environment:
        KAFKA_BROKERS: redpanda:9092
        TELEMETRY_URL: http://telemetry:4000
        BOT_COUNT: "20"           # 20 workers per submission
        BOT_LAMBDA: "15"          # 15 orders/sec per bot (Poisson) → ~300 TPS total
      depends_on:
        redpanda:
          condition: service_healthy
        telemetry:
          condition: service_started
      networks:
        - iicpc-network   # ← Kafka + Telemetry
        - sandbox-net     # ← contestant containers by IP
    
  telemetry:
    build:
      context: ..
      dockerfile: packages/telemetry/Dockerfile
    container_name: iicpc-telemetry
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ../.env
    environment:
      TELEMETRY_PORT: "4000"
      TIMESCALE_URL: postgres://postgres:postgres@timescale:5432/iicpc
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - iicpc-network   # ← receives from bots only

  leaderboard:
    build:
      context: ..
      dockerfile: packages/leaderboard/Dockerfile
    container_name: iicpc-leaderboard
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - ../.env
    environment:
      LEADERBOARD_PORT: "4001"
      TIMESCALE_URL: postgres://postgres:postgres@timescale:5432/iicpc
      REDIS_URL: redis://redis:6379
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iicpc-network

  redpanda:
    image: redpandadata/redpanda:v25.1.4
    container_name: iicpc-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - iicpc-network

  timescale:
    image: timescale/timescaledb:2.17.2-pg15
    container_name: iicpc-timescale
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: iicpc
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
    networks:
      - iicpc-network

  redis:
    image: redis:7.2-alpine
    container_name: iicpc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    networks:
      - iicpc-network

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: iicpc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
    networks:
      - iicpc-network

volumes:
  timescale_data:
  minio_data:

networks:
  iicpc-network:
    driver: bridge
    name: iicpc-network      # pin exact name — prevents compose project-prefix (infra_iicpc-network)

  sandbox-net:
    driver: bridge
    internal: true           # submission containers get NO internet routing
    name: sandbox-net        # pin exact name — runner.ts hardcodes 'sandbox-net', must match

